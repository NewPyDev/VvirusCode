name: AirMax TV Weekly Code Fetcher

on:
  # Runs every Sunday at 03:00 UTC (04:00 Europe/CET)
  # Code updates between 00:30-02:30 Europe time, so 03:00 UTC gives buffer
  schedule:
    - cron: '0 3 * * 0'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-code:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: Run AirMax code fetcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python airmax_code_fetcher.py

      - name: Save last code to repo
        run: |
          if [ -f last_code.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add last_code.txt
            git diff --cached --quiet || git commit -m "Update last_code.txt [skip ci]"
            git push
          fi
