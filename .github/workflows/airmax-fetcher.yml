name: AirMax TV Weekly Code Fetcher

on:
  # Runs every Sunday at 03:00 UTC (04:00 Europe/CET)
  # Code updates between 00:30-02:30 Europe time, so 03:00 UTC gives buffer
  schedule:
    - cron: '0 3 * * 0'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  fetch-code:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install selenium requests

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run AirMax code fetcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python airmax_code_fetcher.py
